# ============================================================
# Netlify Configuration for Food Poll Telegram Bot
# ============================================================
# Bot runs in WEBHOOK mode via a Python serverless function.
# Webhook handler: netlify/functions/webhook.py
#
# After deploying, register the webhook with Telegram ONCE:
#   https://api.telegram.org/bot<BOT_TOKEN>/setWebhook?url=https://<your-site>.netlify.app/webhook
# ============================================================

[build]
  publish = "public"
  # Creates the required publish directory and installs deps for the function
  command  = "mkdir -p public && echo 'Food Bot — deployed via webhook' > public/index.html"

# --------------- Python Functions Runtime -------------------
[functions]
  directory = "netlify/functions"

# Python 3.11 runtime + bundle the bot/ package alongside the function
[functions."webhook"]
  runtime        = "python3.11"
  # Include the entire bot package so imports work inside the function
  included_files = ["bot/**"]

# --------------- Environment Variables ----------------------
# Set BOT_TOKEN in Netlify dashboard → Site settings → Environment variables.
# Never commit secrets to this file.
[context.production.environment]
  LOG_LEVEL = "INFO"

[context.deploy-preview.environment]
  LOG_LEVEL = "DEBUG"

# --------------- Redirects / Rewrites -----------------------
# Clean URL: /webhook → /.netlify/functions/webhook
[[redirects]]
  from   = "/webhook"
  to     = "/.netlify/functions/webhook"
  status = 200

# --------------- HTTP Security Headers -----------------------
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
